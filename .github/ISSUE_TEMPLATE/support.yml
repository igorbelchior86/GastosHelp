name: Support request
description: Report a bug, ask for help, or request a feature for Gastos+.
labels:
  - support
body:
  - type: input
    id: subject
    attributes:
      label: Subject
      placeholder: Short description of the issue
    validations:
      required: true
  - type: input
    id: email
    attributes:
      label: Email
      placeholder: you@example.com
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Bug / unexpected behavior
        - Budgets
        - Planned spending
        - Cards & invoices
        - Shared accounts
        - Sync / offline
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version / build
      placeholder: Optional
    validations:
      required: false
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Include steps to reproduce, expected behavior, and any useful context.
      placeholder: Steps to reproduce, what happened, expected behavior, and anything useful.
    validations:
      required: true
